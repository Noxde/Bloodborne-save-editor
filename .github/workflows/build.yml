name: "publish"

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"

          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"

          - platform: "ubuntu-24.04"
            args: ""

          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ✅ Linux dependencies + fixes for quick-sharun
      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            curl \
            wget \
            file \
            bash \
            coreutils \
            xz-utils \
            binutils

          # Fix missing /bin/sh issue
          sudo ln -sf /bin/bash /bin/sh

          # Debug (optional but useful)
          which sh
          which bash
          ls -l /bin/sh

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: npm install

      # 🚀 Install experimental Tauri CLI (Linux only)
      - name: Install experimental tauri-cli
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          cargo install tauri-cli \
            --git https://github.com/tauri-apps/tauri \
            --branch feat/truly-portable-appimage \
            --force

      # 🚀 Build with new AppImage format
      - name: Build Tauri (experimental AppImage)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT="true" CI=false cargo tauri build

      # 🧱 Standard builds (macOS + Windows)
      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform != 'ubuntu-24.04'
        env:
          CI: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Bloodborne save editor ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 📦 Upload Linux AppImage artifact
      - name: Upload AppImage
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
